name: Gettex Export

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 1-5'

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run export
        run: python gettex_export.py

      - name: Upload Excel
        uses: actions/upload-artifact@v4
        with:
          name: gettex-export
          path: "*.xlsx"
